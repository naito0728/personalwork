<style>
    .site-header {
        padding-top: 0;
        padding-bottom: 0;
    }

    .site-header .l-container {
        padding-left: 16px;
        max-width: 100%;
        margin: 0;
    }

    .site-header__inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-3);
        height: 60px;
    }

    .site-logo-wrap {
        height: 100%;
        display: flex;
        align-items: center;
        gap: var(--space-2);
    }

    .site-title {
        font-size: var(--fs-h3);
        font-weight: 500;
        color: var(--mono-100);
    }

    .site-logo {
        display: block;
        width: auto;
        height: 100%;
        margin: 0;
        padding: 0;
        flex-shrink: 0;
    }

    .site-nav {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
        justify-content: flex-end;
    }

    .site-nav__link {
        display: inline-block;
        padding: var(--space-1) var(--space-3);
        border: var(--border-standard);
        border-radius: var(--radius-s);
        background-color: var(--mono-100);
        font-size: var(--fs-data);
        font-weight: bold;
    }

    .site-nav__user {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: var(--space-1) var(--space-3);
        background: rgba(255,255,255,0.15);
        border-radius: var(--radius-s);
        font-size: var(--fs-data);
        color: var(--mono-100);
        font-weight: 600;
        cursor: default;
    }

    .user-avatar {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: #e63200;
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        border: 2px solid rgba(255,255,255,0.6);
    }

    .user-menu-wrap {
        position: relative;
    }

    .user-menu-trigger {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: var(--space-1) var(--space-3);
        background: rgba(255,255,255,0.15);
        border-radius: var(--radius-s);
        font-size: var(--fs-data);
        color: var(--mono-100);
        font-weight: 600;
        cursor: pointer;
        border: none;
        user-select: none;
    }

    .user-menu-trigger:hover {
        background: rgba(255,255,255,0.25);
    }

    .user-dropdown {
        display: none;
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        min-width: 220px;
        z-index: 1000;
        overflow: hidden;
    }

    .user-dropdown.open {
        display: block;
    }

    .user-dropdown-info {
        padding: 16px;
        border-bottom: 1px solid #f0f0f0;
    }

    .user-dropdown-name {
        font-size: 14px;
        font-weight: 700;
        color: #1a1a2e;
        margin-bottom: 4px;
    }

    .user-dropdown-email {
        font-size: 12px;
        color: #888;
    }

    .user-dropdown-logout {
        display: block;
        width: 100%;
        padding: 12px 16px;
        text-align: left;
        background: none;
        border: none;
        font-size: 13px;
        font-weight: 600;
        color: #e63200;
        cursor: pointer;
        text-decoration: none;
    }

    .user-dropdown-logout:hover {
        background: #fff5f3;
    }

    @media (max-width: 900px) {
        .site-header__inner {
            height: 72px;
        }
    }
</style>
<header class="site-header">
    <div class="l-container site-header__inner">
        <div class="site-logo-wrap" aria-label="Project Logo">
            <svg class="site-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 253">
                <path fill="#e63200" d="M0 0 L119 0 L119 67 L42 127 L119 185 L119 252 L0 252 L0 185 L42 185 L42 67 L0 67 Z"/>
            </svg>
            <a href="{{ url_for('read_dashboard') }}"><span class="site-title">AIキャリア成長支援システム</span></a>
        </div>
        <nav class="site-nav" aria-label="メインナビゲーション">
            <a class="site-nav__link" href="{{ url_for('read_dashboard') }}">ダッシュボード</a>
            <a class="site-nav__link" href="{{ url_for('read_chat') }}">AIキャリアアドバイザー</a>
            <a class="site-nav__link" href="{{ url_for('read_roadmap') }}">ロードマップ</a>
            {% if user %}
            <div class="user-menu-wrap">
                <button class="user-menu-trigger" id="userMenuTrigger" onclick="toggleUserMenu()">
                    <span class="user-avatar">{{ user.name[0] }}</span>
                    {{ user.name }}
                </button>
                <div class="user-dropdown" id="userDropdown">
                    <div class="user-dropdown-info">
                        <div class="user-dropdown-name">{{ user.name }}</div>
                        <div class="user-dropdown-email">{{ user.email }}</div>
                    </div>
                    <a class="user-dropdown-logout" href="/logout">ログアウト</a>
                </div>
            </div>
            {% endif %}
        </nav>
    </div>
</header>
<script>
function toggleUserMenu() {
    document.getElementById('userDropdown').classList.toggle('open');
}
document.addEventListener('click', function(e) {
    const trigger = document.getElementById('userMenuTrigger');
    const dropdown = document.getElementById('userDropdown');
    if (trigger && dropdown && !trigger.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.classList.remove('open');
    }
});
</script>
